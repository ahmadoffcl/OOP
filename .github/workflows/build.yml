name: Build SCMS

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show compiler
        run: g++ --version
      - name: Compile
        run: g++ -std=c++17 -Wall -Wextra src/main.cpp src/person/*.cpp src/course/*.cpp src/library/*.cpp src/finance/*.cpp src/hostel/*.cpp src/utils/*.cpp -o scms
      - name: Smoke test all menus
        run: |
          printf '1\n1\n2\n0\n2\n1\n2\n3\n4\n5\n0\n3\n1\n2\n3\nC++ Basics\n4\n6\n5\n6\n7\n0\n4\n1\n2\n3\n0\n5\n1\n2\n3\n4\n5\n6\n4\n0\n6\n1\n2\n25-CS-067\n3\n4\n5\n0\nabc\n0\n' | ./scms
      - name: Check generated reports
        run: |
          test -f data/campus_report.txt
          test -f data/campus_pdf_report.txt
